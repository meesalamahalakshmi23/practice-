<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>College Admission Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: hwb(140 95% 4%);
      margin: 0;
      padding: 0;
    }

    h1 {
      text-align: center;
      color: #f50909;
      text-shadow: 0px 2px 6px rgba(15, 15, 14, 0.918);
      margin-top: 20px;
    }

    form {
      width: 350px;
      background-color: rgb(238, 202, 202);
      margin: 30px auto;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0px 4px 10px rgba(245, 2, 2, 0.2);
    }

    fieldset {
      border: 2px solid hsl(0, 0%, 1%);
      border-radius: 8px;
      padding: 15px;
    }

    legend {
      font-weight: bold;
      color: #2c3e50;
    }

    label {
      display: inline-block;
      width: 100px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    input, select, textarea {
      width: 90%;
      padding: 5px;
      border-radius: 5px;
      border: 1px solid #e61111;
      margin-bottom: 10px;
      font-size: 14px;
    }

    input[type="radio"] {
      width: auto;
    }

    button {
      background-color: #3498db;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 5px;
      margin: 5px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #1d6fa5;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <h1>College Admission Form</h1>

  <form>
    <fieldset>
      <legend>Student Details</legend>

      <label>Name:</label>
      <input type="text" placeholder="Enter your name"><br>

      <label>Email:</label>
      <input type="email" placeholder="Enter your email"><br>

      <label>Contact:</label>
      <input type="tel" placeholder="Enter phone number"><br>

      <label>Gender:</label>
      <input type="radio" name="gender">Male
      <input type="radio" name="gender">Female
      <input type="radio" name="gender">Other<br>

      <label>DOB:</label>
      <input type="date"><br>

      <label>Course:</label>
      <select>
        <option>B.Tech</option>
        <option>B.Sc</option>
        <option>BCA</option>
      </select><br>

      <label>Address:</label><br>
      <textarea rows="3" cols="30" placeholder="Enter your address"></textarea><br>

      <button type="submit">Submit</button>
      <button type="reset">Reset</button>
    </fieldset>
  </form>

</body>
</html>
